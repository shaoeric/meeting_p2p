name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run pack:win:dir
      - uses: actions/upload-artifact@v4
        with:
          name: PeerMeeting-win-x64
          path: release/win-unpacked/
